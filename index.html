<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="author" content="S.Z." />
    <meta name="description" content="Project inspired by Love and Deepspace, recreating the N109 Zone aesthetic and themes related to Sylus.">
    <meta name="keywords" content="Love and Deepspace, LADS, Sylus, Fan-made website, HTML, CSS, JavaScript, Web development practice">
    <link rel="shortcut icon" href="./assets/Icon/Icon.png" type="image/png" />
    <link rel="stylesheet" href="style.css" />
    
    <title>Onychinus Secret Archives</title>
</head>
<body>

  <div id="login-screen">
    <h1>ONYCHINUS INTERNAL ACCESS</h1>
    <input id="password-input" type="password" placeholder="Enter clearance code">
    <button id="access-btn">ACCESS</button>
    <p id="error-message"></p>
  </div>

  <main id="archive">
    <section class="archive-header">
      <h2>ONYCHINUS RESTRICTED ARCHIVE — CLEARANCE VERIFIED</h2>
      <p class="system-status">NODE N109 — CLEARANCE IV</p>
    </section>

    <section class="desktop-grid">
      <div class="folder">
        <div class="folder-tab"></div>
        <span>SUBJECT DOSSIERS</span>
      </div>

      <div class="folder locked">
        <div class="folder-tab"></div>
        <span>OPERATION LOGS</span>
      </div>

      <div class="folder locked">
        <div class="folder-tab"></div>
        <span>CRIMSON DIRECTIVE</span>
      </div>

      <div class="folder locked">
        <div class="folder-tab"></div>
        <span>BLACK VAULT 🔒</span>
      </div>
    </section>

    <footer class="archive-footer">
      <p>ONYCHINUS // Build 0.4.0 // Internal Use Only</p>
    </footer>
  </main>

<script src="script.js"></script>
</body>
</html>
